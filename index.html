<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worthy Company</title>
  <style>
    :root { --bg: #0f0f12; --surface: #1a1b1e; --text: #e4e4e7; --muted: #71717a; --accent: #7c3aed; --border: #2d2d35; }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 2rem; max-width: 40rem; margin-left: auto; margin-right: auto; }
    h1 { font-size: 1.5rem; margin-top: 0; }
    p { color: var(--muted); margin: 0.5rem 0 1rem; }
    a { color: var(--accent); }
    ul { list-style: none; padding: 0; margin: 1rem 0; }
    li { margin: 0.5rem 0; }
    li a { display: inline-block; padding: 0.35rem 0; }
  </style>
</head>
<body>
</body>
</html>
